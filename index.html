<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猪猪护理中心 · 专业指南</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffe6f2 0%, #ffd9e8 100%);
            font-family: '微软雅黑', 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 30px 20px;
        }

        /* 动态飘浮猪猪贴图 */
        .floating-pig {
            position: fixed;
            font-size: 40px;
            pointer-events: none;
            z-index: 999;
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .pig1 { bottom: 10%; left: 2%; animation-duration: 6s; }
        .pig2 { top: 15%; right: 3%; animation-duration: 7s; animation-delay: 1s; }
        .pig3 { bottom: 20%; right: 5%; animation-duration: 9s; animation-delay: 2s; }
        .pig4 { top: 40%; left: 1%; animation-duration: 5s; animation-delay: 0.5s; }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 返回主页按钮 */
        .back-home {
            display: inline-block;
            background: #ff80aa;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: bold;
            transition: transform 0.3s, background 0.3s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        .back-home:hover {
            background: #ff6699;
            transform: scale(1.02);
        }

        /* 主卡片 */
        .main-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(255, 102, 153, 0.2);
            overflow: hidden;
            transition: transform 0.3s;
        }

        .main-card:hover {
            transform: translateY(-5px);
        }

        /* 头部区域 */
        .hero {
            background: linear-gradient(120deg, #ff99bb, #ff80aa);
            padding: 30px 40px;
            color: white;
            text-align: center;
        }

        .hero-icon {
            font-size: 80px;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.2));
        }

        .hero h1 {
            font-size: 32px;
            margin: 15px 0 8px;
        }

        .hero p {
            font-size: 18px;
            opacity: 0.95;
        }

        /* 内容区域 */
        .content {
            padding: 35px 40px;
        }

        .section {
            margin-bottom: 28px;
        }

        .section-title {
            font-size: 22px;
            color: #ff6699;
            border-left: 5px solid #ff80aa;
            padding-left: 15px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .overview {
            background: #fff5f8;
            padding: 18px 22px;
            border-radius: 20px;
            line-height: 1.8;
            color: #555;
            font-size: 16px;
        }

        .key-list {
            list-style: none;
            padding-left: 0;
        }

        .key-list li {
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff80aa" width="18px" height="18px"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>') left center no-repeat;
            background-size: 18px;
            padding-left: 28px;
            margin-bottom: 12px;
            line-height: 1.6;
            color: #444;
        }

        .info-box {
            background: #e8f4f8;
            border-radius: 16px;
            padding: 18px;
            margin-top: 20px;
            border-left: 4px solid #ff80aa;
        }

        .info-box.warning {
            background: #fff0f0;
            border-left-color: #ff4444;
        }

        .info-box.tips {
            background: #f0f7e8;
            border-left-color: #6b8c42;
        }

        .image-placeholder {
            margin: 25px 0;
            text-align: center;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .image-placeholder img {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .image-placeholder img:hover {
            transform: scale(1.02);
        }

        .footer-note {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px dashed #ffc0cb;
            color: #ff99aa;
            font-size: 14px;
        }

        /* 子页面网格预览（首页用） */
        .grid-preview {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .preview-card {
            background: #fffafc;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            border: 1px solid #ffe0e8;
        }

        .preview-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(255, 102, 153, 0.2);
            border-color: #ff80aa;
        }

        .preview-icon {
            font-size: 48px;
        }

        .preview-card h3 {
            color: #ff6699;
            margin: 12px 0 8px;
        }

        .preview-card p {
            color: #888;
            font-size: 14px;
        }

        .home-title {
            font-size: 28px;
            text-align: center;
            color: #ff6699;
            margin-bottom: 15px;
        }

        /* ========== 音乐播放器样式 ========== */
        .music-player {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .music-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #ff80aa;
            border: 2px solid white;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(255, 102, 153, 0.5);
            transition: transform 0.3s, background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .music-btn:hover {
            transform: scale(1.08);
            background: #ff6699;
        }

        .music-icon {
            font-size: 28px;
            transition: transform 0.2s;
        }

        /* 音乐播放时的旋转动画 */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .music-btn.playing .music-icon {
            animation: rotate 3s linear infinite;
            display: inline-block;
        }

        .music-tip {
            background: rgba(255, 128, 170, 0.92);
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            font-size: 13px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .music-player:hover .music-tip {
            opacity: 1;
        }

        @media (max-width: 700px) {
            .content { padding: 25px; }
            .hero h1 { font-size: 24px; }
            .grid-preview { grid-template-columns: 1fr; }
            .music-btn { width: 45px; height: 45px; }
            .music-icon { font-size: 22px; }
            .music-tip { font-size: 11px; }
        }
    </style>
</head>
<body>

<!-- 动态漂浮猪猪贴图 -->
<div class="floating-pig pig1">🐷✨</div>
<div class="floating-pig pig2">🐽💕</div>
<div class="floating-pig pig3">🐖🌸</div>
<div class="floating-pig pig4">🐷🍎</div>

<div class="container" id="app"></div>

<!-- 音乐播放器控件 -->
<div class="music-player" id="musicPlayer">
    <button class="music-btn" id="musicBtn">
        <span class="music-icon">🎵</span>
    </button>
    <div class="music-tip">🐷 猪猪治愈曲 🐷</div>
</div>

<script>
    // ========== 音乐播放控制 ==========
    const music = new Audio('pig.mp3');
    music.loop = true;      // 循环播放
    music.volume = 0.5;     // 音量50%

    const musicBtn = document.getElementById('musicBtn');
    let isPlaying = false;

    // 尝试自动播放（可能被浏览器阻止）
    music.play().then(() => {
        isPlaying = true;
        musicBtn.classList.add('playing');
    }).catch(e => {
        console.log('自动播放被阻止，点击按钮开始播放');
    });

    // 点击按钮控制播放/暂停
    musicBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isPlaying) {
            music.pause();
            musicBtn.classList.remove('playing');
        } else {
            music.play();
            musicBtn.classList.add('playing');
        }
        isPlaying = !isPlaying;
    });

    // ========== 页面数据与路由逻辑 ==========
    let productsData = { products: [] };

    // 获取 URL 中的 id 参数
    function getUrlParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    // 加载 products.json
    async function loadProducts() {
        try {
            const response = await fetch('products.json');
            if (!response.ok) throw new Error('无法加载数据文件');
            const data = await response.json();
            productsData = data;
            render();
        } catch (error) {
            console.error('加载失败:', error);
            document.getElementById('app').innerHTML = `
                <div class="main-card" style="padding: 40px; text-align: center;">
                    <h2>😢 数据加载失败</h2>
                    <p>请确保 products.json 文件存在且格式正确</p>
                    <a href="index.html" class="back-home">🏠 返回主页</a>
                </div>
            `;
        }
    }

    // 根据 id 查找产品
    function findProductById(id) {
        if (!id) return null;
        const numId = parseInt(id);
        return productsData.products.find(p => p.id === numId);
    }

    // 渲染主页（无id参数时显示网格导航）
    function renderHomePage() {
        return `
            <div class="main-card">
                <div class="hero">
                    <div class="hero-icon">🐷🏆</div>
                    <h1>🐽 可爱猪猪护理中心 🐽</h1>
                    <p>专业 · 科学 · 有爱 —— 给猪猪最好的陪伴</p>
                </div>
                <div class="content">
                    <div class="home-title">📋 护理指南专区</div>
                    <div class="grid-preview">
                        ${productsData.products.map(product => `
                            <a href="?id=${product.id}" class="preview-card">
                                <div class="preview-icon">${product.icon}</div>
                                <h3>${product.name}</h3>
                                <p>${product.subtitle}</p>
                                <span style="display:inline-block;margin-top:12px;color:#ff80aa;">点击查看详情 →</span>
                            </a>
                        `).join('')}
                    </div>
                    <div class="footer-note">
                        🌟 点击任意卡片，获取专业护理知识 🌟
                    </div>
                </div>
            </div>
        `;
    }

    // 渲染详情页（根据产品数据）
    function renderDetailPage(product) {
        if (!product) {
            return `
                <div class="main-card" style="padding: 40px; text-align: center;">
                    <h2>😢 未找到相关护理指南</h2>
                    <p>请检查链接是否正确，id 范围 1-4</p>
                    <a href="index.html" class="back-home">🏠 返回主页</a>
                </div>
            `;
        }

        const content = product.content;
        return `
            <a href="index.html" class="back-home">← 返回主页</a>
            <div class="main-card">
                <div class="hero">
                    <div class="hero-icon">${product.icon} ${product.name.split(' ')[0]}</div>
                    <h1>${product.name}</h1>
                    <p>${product.subtitle}</p>
                </div>
                <div class="content">
                    <div class="image-placeholder">
                        <img src="${product.imageUrl}" alt="猪猪护理配图" loading="lazy">
                    </div>

                    <div class="section">
                        <div class="section-title">
                            <span>📖</span> 专业概述
                        </div>
                        <div class="overview">
                            ${content.overview}
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">
                            <span>✅</span> 核心要点
                        </div>
                        <ul class="key-list">
                            ${content.keyPoints.map(point => `<li>${point}</li>`).join('')}
                        </ul>
                    </div>

                    ${content.dailySchedule ? `
                    <div class="info-box">
                        <strong>⏰ 每日作息建议：</strong><br>${content.dailySchedule}
                    </div>
                    ` : ''}

                    ${content.cleaningGuide ? `
                    <div class="info-box">
                        <strong>🧹 清洁消毒步骤：</strong><br>${content.cleaningGuide}
                    </div>
                    ` : ''}

                    ${content.vaccinationSchedule ? `
                    <div class="info-box">
                        <strong>💉 疫苗接种时间表：</strong><br>${content.vaccinationSchedule}
                    </div>
                    ` : ''}

                    ${content.behavioralSigns ? `
                    <div class="info-box">
                        <strong>🐽 行为解读：</strong><br>${content.behavioralSigns}
                    </div>
                    ` : ''}

                    ${content.warning ? `
                    <div class="info-box warning">
                        <strong>⚠️ 重要警示</strong><br>${content.warning}
                    </div>
                    ` : ''}

                    ${content.emergencySigns ? `
                    <div class="info-box warning">
                        <strong>🚨 紧急就医信号</strong><br>${content.emergencySigns}
                    </div>
                    ` : ''}

                    <div class="info-box tips">
                        <strong>💡 小贴士</strong><br>${product.tips}
                    </div>

                    <div class="footer-note">
                        🐷 科学养宠，从了解开始 | 更多问题可咨询专业兽医 🐷
                    </div>
                </div>
            </div>
        `;
    }

    // 主渲染逻辑
    function render() {
        const app = document.getElementById('app');
        const idParam = getUrlParameter('id');
        
        if (idParam !== null) {
            const product = findProductById(idParam);
            app.innerHTML = renderDetailPage(product);
        } else {
            app.innerHTML = renderHomePage();
        }
    }

    // 页面启动
    loadProducts();
</script>
</body>
</html>
